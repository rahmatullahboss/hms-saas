name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Java (required for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install web dependencies
        run: npm install
        working-directory: web

      - name: Build web app
        run: npm run build
        working-directory: web

      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: web

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/hms-release.keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release APK
        run: ./gradlew assembleRelease
        working-directory: web/android
        env:
          ANDROID_KEYSTORE_FILE: /tmp/hms-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Release APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: hms-android-release-${{ github.run_number }}
          path: web/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: HMS v1.0.${{ github.run_number }}
          body: |
            ## 🏥 HMS SaaS — Android Release

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            ### Download
            Install the APK on any Android device (Android 7+).
          files: web/android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
