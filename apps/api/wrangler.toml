name = "hms-saas"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── Cloudflare Bindings ──────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "danphe-meta"
database_id = "cd97b7d8-4068-47f7-b9d2-5e28ec7dfc98"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"
id = "ed8650b9af6549ecbaf5cc90b187d53b"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "hms-uploads"

# ─── Default (development) vars ───────────────────────────────────────
# JWT_SECRET must be set as a Wrangler secret (never in vars!):
#   wrangler secret put JWT_SECRET
# 
[vars]
ENVIRONMENT = "development"
ALLOWED_ORIGINS = "http://localhost:5174,http://localhost:5173"

# ─── Staging environment ──────────────────────────────────────────────
[env.staging]
name = "hms-saas-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
ALLOWED_ORIGINS = "https://staging.yourdomain.com"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "hms-super-admin-staging"
database_id = "9e72382e-0d73-49da-90c8-ad5ff6fc5911"

[[env.staging.kv_namespaces]]
binding = "KV"
id = "7907d8fc866848e3ba115fbe975a0fde"

[[env.staging.r2_buckets]]
binding = "UPLOADS"
bucket_name = "hms-uploads-staging"

# ─── Production environment ───────────────────────────────────────────
[env.production]
name = "hms-saas-production"

[env.production.vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://yourdomain.com,https://www.yourdomain.com"

[[env.production.d1_databases]]
binding = "DB"
database_name = "hms-super-admin-production"
database_id = "f5ec1282-94e9-4574-b49c-19b50c03ed53"

[[env.production.kv_namespaces]]
binding = "KV"
id = "ed8650b9af6549ecbaf5cc90b187d53b"

[[env.production.r2_buckets]]
binding = "UPLOADS"
bucket_name = "hms-uploads-production"
