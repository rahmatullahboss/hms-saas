name = "ozzyl-hms"
main = "src/index.ts"
account_id = "474078d5f990169d7dadf4e1df83214a"
compatibility_date = "2026-02-17"
compatibility_flags = ["nodejs_compat"]

# ─── Observability (Worker Logs + Traces) ─────────────────────────────
[observability]
enabled = true

[observability.logs]
head_sampling_rate = 1

[observability.traces]
enabled = true
head_sampling_rate = 1

# ─── Static Assets (React SPA) ────────────────────────────────────────
# Vite builds to web/dist/ — served free, without invoking the Worker
[assets]
directory = "./web/dist/"
binding = "ASSETS"
not_found_handling = "single-page-application"
# API + public website routes run the Worker; everything else served as static asset
run_worker_first = ["/api/*", "/site/*", "/sitemap.xml", "/robots.txt"]

# ─── Cloudflare Bindings ──────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "hms-super-admin-production"
database_id = "f5ec1282-94e9-4574-b49c-19b50c03ed53"

[[kv_namespaces]]
binding = "KV"
id = "ed8650b9af6549ecbaf5cc90b187d53b"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "hms-uploads"

# ─── AI Memory (Vectorize + Workers AI) ──────────────────────────────
[[vectorize]]
binding = "VECTORIZE"
index_name = "hms-ai-memory"

[ai]
binding = "AI"

# ─── Durable Objects (Real-time Dashboard) ───────────────────────────
[[durable_objects.bindings]]
name = "DASHBOARD_DO"
class_name = "DashboardDO"

[[migrations]]
tag = "v1-dashboard-do"
new_sqlite_classes = ["DashboardDO"]

# ─── CRON Triggers ────────────────────────────────────────────────────
# NOTE: Account limit is 5 cron triggers total. Only configure in env.production below.
# [triggers]
# crons = ["0 0 * * *"]

# ─── Default (development) vars ───────────────────────────────────────
# JWT_SECRET must be set as a Wrangler secret (never in vars!):
#   wrangler secret put JWT_SECRET
[vars]
ENVIRONMENT = "development"
ALLOWED_ORIGINS = "http://localhost:5174,http://localhost:5173"
# Email (Resend) — set RESEND_API_KEY via: wrangler secret put RESEND_API_KEY
# Without the secret, emails are logged to console (stub mode)
RESEND_FROM_EMAIL = "HMS Dev <dev@hms.local>"
# SMS — set SMS_API_KEY + SMS_SENDER_ID via wrangler secrets when service is purchased
# ─── AI (OpenRouter) ──────────────────────────────────────────────────────────
# wrangler secret put OPENROUTER_API_KEY
# Optional: set AI_MODEL env var to override default (openrouter/healer-alpha)
SMS_PROVIDER = "stub"
# ─── Phase 3: bKash / Nagad / Daily.co (set real values via wrangler secrets) ─
# wrangler secret put BKASH_APP_KEY
# wrangler secret put BKASH_APP_SECRET
# wrangler secret put BKASH_USERNAME
# wrangler secret put BKASH_PASSWORD
# wrangler secret put NAGAD_MERCHANT_ID
# wrangler secret put NAGAD_MERCHANT_PRIVATE_KEY
# — Telemedicine: Cloudflare Realtime SFU (Dashboard → Realtime SFU → Create App)
# wrangler secret put CF_REALTIME_APP_ID
# wrangler secret put CF_REALTIME_APP_SECRET
# Without secrets, Jitsi free fallback is used automatically.

# ─── Staging environment ──────────────────────────────────────────────
[env.staging]
name = "ozzyl-hms-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
ALLOWED_ORIGINS = "https://ozzyl-hms-staging.rahmatullahzisan.workers.dev"
RESEND_FROM_EMAIL = "HMS Staging <noreply@hms-staging.app>"
SMS_PROVIDER = "stub"
# bKash/Nagad/Daily — set via wrangler secrets (--env staging)

[env.staging.assets]
directory = "./web/dist/"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "hms-super-admin-staging"
# Separate staging D1 database — created 2026-03-11
# This is DIFFERENT from production (f5ec1282-94e9-4574-b49c-19b50c03ed53)
database_id = "9e72382e-0d73-49da-90c8-ad5ff6fc5911"

[[env.staging.kv_namespaces]]
binding = "KV"
# Dedicated staging KV namespace — created 2026-03-11
# ISOLATED from production (ed8650b9af6549ecbaf5cc90b187d53b)
id = "7907d8fc866848e3ba115fbe975a0fde"

[[env.staging.r2_buckets]]
binding = "UPLOADS"
bucket_name = "hms-uploads-staging"

# ─── Production environment ───────────────────────────────────────────
[env.production]
name = "ozzyl-hms-production"

# Migration to delete previously-deployed AccountingDashboard Durable Object
[[env.production.migrations]]
tag = "v2-remove-accounting-do"
deleted_classes = ["AccountingDashboard"]

[[env.production.migrations]]
tag = "v3-dashboard-do"
new_sqlite_classes = ["DashboardDO"]

[[env.production.durable_objects.bindings]]
name = "DASHBOARD_DO"
class_name = "DashboardDO"

# NOTE: CRON trigger disabled — account limit of 5 reached.
# Uncomment after removing unused crons from other workers or upgrading plan.
# [env.production.triggers]
# crons = ["0 0 * * *"]

[env.production.vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://ozzyl-hms.rahmatullahzisan.workers.dev,https://*.ozzyl.com"
# Replace with your verified Resend domain email once domain is verified
RESEND_FROM_EMAIL = "HMS <noreply@yourhospital.com>"
# Change to "sslwireless" or "bnotify" when SMS service is activated
SMS_PROVIDER = "stub"
# bKash/Nagad/Daily — set via wrangler secrets (--env production)
# NOTE: HMS subdomains (hms-*.ozzyl.com) are routed here via
# multi-store-saas worker's service binding (HMS_SERVICE).

[env.production.assets]
directory = "./web/dist/"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/site/*", "/sitemap.xml", "/robots.txt"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "hms-super-admin-production"
database_id = "f5ec1282-94e9-4574-b49c-19b50c03ed53"

[[env.production.kv_namespaces]]
binding = "KV"
id = "ed8650b9af6549ecbaf5cc90b187d53b"

[[env.production.r2_buckets]]
binding = "UPLOADS"
bucket_name = "hms-uploads-production"
