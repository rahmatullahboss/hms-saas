name = "hms-saas"
main = "src/index.ts"
account_id = "474078d5f990169d7dadf4e1df83214a"
compatibility_date = "2026-02-17"
compatibility_flags = ["nodejs_compat"]

# ─── Observability (Worker Logs + Traces) ─────────────────────────────
[observability]
enabled = true

[observability.logs]
head_sampling_rate = 1

[observability.traces]
enabled = true
head_sampling_rate = 1

# ─── Static Assets (React SPA) ────────────────────────────────────────
# Vite builds to web/dist/ — served free, without invoking the Worker
[assets]
directory = "./web/dist/"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Only /api/* runs the Worker; everything else served as static asset
run_worker_first = ["/api/*"]

# ─── Cloudflare Bindings ──────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "hms-super-admin-production"
database_id = "f5ec1282-94e9-4574-b49c-19b50c03ed53"

[[kv_namespaces]]
binding = "KV"
id = "ed8650b9af6549ecbaf5cc90b187d53b"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "hms-uploads"

# ─── Default (development) vars ───────────────────────────────────────
# JWT_SECRET must be set as a Wrangler secret (never in vars!):
#   wrangler secret put JWT_SECRET
[vars]
ENVIRONMENT = "development"
ALLOWED_ORIGINS = "http://localhost:5174,http://localhost:5173"
# Email (Resend) — set RESEND_API_KEY via: wrangler secret put RESEND_API_KEY
# Without the secret, emails are logged to console (stub mode)
RESEND_FROM_EMAIL = "HMS Dev <dev@hms.local>"
# SMS — set SMS_API_KEY + SMS_SENDER_ID via wrangler secrets when service is purchased
SMS_PROVIDER = "stub"
# ─── Phase 3: bKash / Nagad / Daily.co (set real values via wrangler secrets) ─
# wrangler secret put BKASH_APP_KEY
# wrangler secret put BKASH_APP_SECRET
# wrangler secret put BKASH_USERNAME
# wrangler secret put BKASH_PASSWORD
# wrangler secret put NAGAD_MERCHANT_ID
# wrangler secret put NAGAD_MERCHANT_PRIVATE_KEY
# — Telemedicine: Cloudflare Realtime SFU (Dashboard → Realtime SFU → Create App)
# wrangler secret put CF_REALTIME_APP_ID
# wrangler secret put CF_REALTIME_APP_SECRET
# Without secrets, Jitsi free fallback is used automatically.

# ─── Staging environment ──────────────────────────────────────────────
[env.staging]
name = "hms-saas-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
ALLOWED_ORIGINS = "https://hms-saas-staging.rahmatullahzisan.workers.dev"
RESEND_FROM_EMAIL = "HMS Staging <noreply@hms-staging.app>"
SMS_PROVIDER = "stub"
# bKash/Nagad/Daily — set via wrangler secrets (--env staging)

[env.staging.assets]
directory = "./web/dist/"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "hms-super-admin-staging"
# Separate staging D1 database — created 2026-03-11
# This is DIFFERENT from production (f5ec1282-94e9-4574-b49c-19b50c03ed53)
database_id = "9e72382e-0d73-49da-90c8-ad5ff6fc5911"

[[env.staging.kv_namespaces]]
binding = "KV"
# Dedicated staging KV namespace — created 2026-03-11
# ISOLATED from production (ed8650b9af6549ecbaf5cc90b187d53b)
id = "7907d8fc866848e3ba115fbe975a0fde"

[[env.staging.r2_buckets]]
binding = "UPLOADS"
bucket_name = "hms-uploads-staging"

# ─── Production environment ───────────────────────────────────────────
[env.production]
name = "hms-saas-production"

[env.production.vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://hms-saas.rahmatullahzisan.workers.dev"
# Replace with your verified Resend domain email once domain is verified
RESEND_FROM_EMAIL = "HMS <noreply@yourhospital.com>"
# Change to "sslwireless" or "bnotify" when SMS service is activated
SMS_PROVIDER = "stub"
# bKash/Nagad/Daily — set via wrangler secrets (--env production)

[env.production.assets]
directory = "./web/dist/"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "hms-super-admin-production"
database_id = "f5ec1282-94e9-4574-b49c-19b50c03ed53"

[[env.production.kv_namespaces]]
binding = "KV"
id = "ed8650b9af6549ecbaf5cc90b187d53b"

[[env.production.r2_buckets]]
binding = "UPLOADS"
bucket_name = "hms-uploads-production"
